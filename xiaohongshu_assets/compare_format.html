<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            padding: 20px;
        }
        .card {
            width: 1080px;
            height: 1440px;
            background: #1e1e2e;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            padding: 60px;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .header {
            font-size: 44px;
            font-weight: bold;
            margin-bottom: 50px;
            text-align: center;
        }
        .section {
            background: #2d2d3d;
            border-radius: 20px;
            padding: 35px;
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 28px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .bad { color: #ff6b6b; }
        .good { color: #4ade80; }
        .code {
            font-family: "SF Mono", Monaco, monospace;
            font-size: 26px;
            background: #1a1a2e;
            padding: 25px;
            border-radius: 12px;
            line-height: 1.5;
        }
        .code-bad { color: #ff6b6b; border-left: 4px solid #ff6b6b; }
        .code-good { color: #4ade80; border-left: 4px solid #4ade80; }
        .footer {
            margin-top: auto;
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        .badge {
            background: #2d2d3d;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">📝 标准 Markdown 格式</div>
        
        <div class="section">
            <div class="section-title bad">❌ 使用前 (Obsidian 默认)</div>
            <div class="code code-bad">[[Pasted image.png]]</div>
        </div>
        
        <div class="section">
            <div class="section-title good">✅ 使用后 (标准格式)</div>
            <div class="code code-good">![alt](../assets/笔记/图片.png)</div>
        </div>
        
        <div class="footer">
            <div class="badge">✅ VS Code</div>
            <div class="badge">✅ Typora</div>
            <div class="badge">✅ GitHub</div>
        </div>
    </div>
</body>
</html>
