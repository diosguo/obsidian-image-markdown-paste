<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            padding: 20px;
        }
        .card {
            width: 1080px;
            height: 1440px;
            background: #2d2d2d;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            padding: 60px;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .header {
            font-size: 44px;
            font-weight: bold;
            margin-bottom: 50px;
            color: #ff6b6b;
        }
        .editor {
            background: #1e1e1e;
            border-radius: 20px;
            padding: 40px;
            font-family: "SF Mono", Monaco, monospace;
            font-size: 28px;
            line-height: 1.6;
            flex: 1;
        }
        .title { color: #4ec9b0; font-size: 32px; margin-bottom: 20px; }
        .text { color: #d4d4d4; margin-bottom: 15px; }
        .broken-img {
            background: #3d3d3d;
            border: 2px dashed #ff6b6b;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            color: #ff6b6b;
            margin: 20px 0;
        }
        .footer {
            margin-top: 40px;
            font-size: 36px;
            color: #ff6b6b;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">😤 分享笔记时图片全挂了</div>
        <div class="editor">
            <div class="title"># 我的学习笔记</div>
            <div class="text">今天学习了 Python 装饰器：</div>
            <div class="broken-img">❓ [图片无法显示]</div>
            <div class="text">装饰器的执行流程如下：</div>
            <div class="broken-img">❓ [图片无法显示]</div>
        </div>
        <div class="footer">WikiLink 格式其他软件不认！路径失效！</div>
    </div>
</body>
</html>
