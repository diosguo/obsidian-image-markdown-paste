<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            padding: 20px;
        }
        .card {
            width: 1080px;
            height: 1440px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 80px;
        }
        .badge {
            background: rgba(255,255,255,0.2);
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 28px;
            margin-bottom: 50px;
        }
        .title {
            font-size: 72px;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: center;
        }
        .subtitle {
            font-size: 40px;
            opacity: 0.9;
            margin-bottom: 80px;
        }
        .divider {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.5);
            margin-bottom: 80px;
        }
        .features {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 100%;
        }
        .feature {
            display: flex;
            align-items: center;
            gap: 25px;
            font-size: 36px;
        }
        .check {
            width: 50px;
            height: 50px;
            background: #4ade80;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">✨ 我的解决方案</div>
        <div class="title">Image Markdown Paste</div>
        <div class="subtitle">Obsidian 图片管理插件</div>
        <div class="divider"></div>
        <div class="features">
            <div class="feature">
                <div class="check">✓</div>
                <span>自动分类存放</span>
            </div>
            <div class="feature">
                <div class="check">✓</div>
                <span>标准 Markdown 格式</span>
            </div>
            <div class="feature">
                <div class="check">✓</div>
                <span>重命名自动同步</span>
            </div>
        </div>
    </div>
</body>
</html>
